# Velo Starter default messages (English)
# Usage: set spring.messages.basename=velo/messages in application.yml
# then reference keys with {key} form, e.g. @Idempotent(message = "{velo.idempotent.rejected}")
velo.idempotent.rejected=Your request has already been submitted, please do not repeat it
velo.ratelimit.rejected=Too many requests, please try again later
velo.lock.failed=System is busy, please try again later
